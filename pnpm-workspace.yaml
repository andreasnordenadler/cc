packages:
  - apps/*

overrides:
  shell-quote: "1.8.4"
  undici: "6.27.0"
  ws: "8.21.0"

# Expo 54.0.36 is the reviewed SDK-compatible patch set used by Android v338.
# Keep pnpm 11's 24-hour release-age guard for every other dependency.
minimumReleaseAgeExclude:
  - "@expo/cli@54.0.26"
  - "@expo/config-plugins@54.0.5"
  - "@expo/config@12.0.14"
  - "@expo/env@2.0.12"
  - "@expo/metro-config@54.0.17"
  - "@expo/prebuild-config@54.0.9"
  - "@expo/schema-utils@0.1.9"
  - "babel-preset-expo@54.0.12"
  - "expo@54.0.36"

allowBuilds:
  "@clerk/shared": false
  "browser-tabs-lock": false
  "bufferutil": false
  "core-js": false
  "esbuild": false
  "sharp": false
  "unrs-resolver": false
  "utf-8-validate": false
