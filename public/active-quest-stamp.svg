<svg xmlns="http://www.w3.org/2000/svg" width="220" height="100" viewBox="0 0 220 100" role="img" aria-label="Active quest stamp">
  <defs>
    <filter id="rough" x="-25%" y="-45%" width="150%" height="190%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.25"/>
    </filter>
    <filter id="lift" x="-30%" y="-50%" width="160%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#050306" flood-opacity="0.65"/>
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#60f0af" flood-opacity="0.72"/>
    </filter>
  </defs>
  <g transform="rotate(-8 110 50)" filter="url(#lift)">
    <rect x="18" y="18" width="184" height="64" rx="14" fill="rgba(8,7,10,.78)" stroke="#f5c86a" stroke-width="2.5"/>
    <g filter="url(#rough)">
      <rect x="23" y="23" width="174" height="54" rx="12" fill="none" stroke="#60f0af" stroke-width="7"/>
      <rect x="35" y="34" width="150" height="32" rx="8" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-dasharray="8 6" opacity="0.72"/>
      <text x="110" y="50" text-anchor="middle" font-family="Arial Black, Impact, system-ui, sans-serif" font-size="22" font-weight="900" letter-spacing="2.3" fill="#ffffff">ACTIVE</text>
      <text x="110" y="68" text-anchor="middle" font-family="Arial Black, Impact, system-ui, sans-serif" font-size="16" font-weight="900" letter-spacing="2.8" fill="#60f0af">QUEST</text>
    </g>
  </g>
</svg>
