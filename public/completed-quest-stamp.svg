<svg xmlns="http://www.w3.org/2000/svg" width="190" height="86" viewBox="0 0 190 86" role="img" aria-label="Completed quest stamp">
  <defs>
    <filter id="rough" x="-20%" y="-40%" width="140%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/>
    </filter>
  </defs>
  <g transform="rotate(-9 95 43)" filter="url(#rough)">
    <rect x="13" y="16" width="164" height="54" rx="12" fill="none" stroke="#f5c86a" stroke-width="5"/>
    <rect x="23" y="25" width="144" height="36" rx="8" fill="none" stroke="#f5c86a" stroke-width="2.5" stroke-dasharray="8 6" opacity="0.9"/>
    <text x="95" y="40" text-anchor="middle" font-family="Arial Black, Impact, system-ui, sans-serif" font-size="17" font-weight="900" letter-spacing="1.6" fill="#f5c86a">COMPLETED</text>
    <text x="95" y="57" text-anchor="middle" font-family="Arial Black, Impact, system-ui, sans-serif" font-size="15" font-weight="900" letter-spacing="2.3" fill="#f5c86a">QUEST</text>
  </g>
</svg>
