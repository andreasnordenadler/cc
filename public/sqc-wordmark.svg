    <filter id="softShadow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <text x="12" y="84"
      fill="#ffd36b"
      font-family="Arial Black, Impact, ui-rounded, system-ui, sans-serif"
      font-size="68"
      font-weight="950"
      letter-spacing="7"
      paint-order="stroke fill"
      stroke="#3a2613"
